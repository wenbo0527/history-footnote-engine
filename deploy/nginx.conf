# 🆕 v2.10.9 Nginx 反代 + 静态前端托管
#
# 用法：
#   1. 前端 build: cd src/frontend && npm run build  (产物在 build/)
#   2. 复制 build/ 到 /var/www/hfe/build/
#   3. sudo cp deploy/nginx.conf /etc/nginx/sites-available/hfe
#   4. sudo ln -s /etc/nginx/sites-available/hfe /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# 部署完成后：
#   - 浏览器访问 https://your-domain.com → 看到 Svelte 前端
#   - /api/* 自动反代到后端 8765 端口

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # 改成你的域名

    # 强制 HTTPS（生产环境强烈建议）
    # return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # SSL 证书（用 certbot 自动获取）
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志
    access_log /var/log/nginx/hfe.access.log;
    error_log /var/log/nginx/hfe.error.log;

    # ==================== 前端静态文件 ====================
    location / {
        root /var/www/hfe;
        try_files $uri $uri/ /index.html;

        # SvelteKit adapter-static 产物
        location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # HTML 文件不缓存（确保版本切换生效）
        location ~* \.html$ {
            add_header Cache-Control "no-cache";
        }
    }

    # ==================== 后端 API 反代 ====================
    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式支持（关键！）
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;  # 长连接 5 分钟
        proxy_send_timeout 300s;
    }

    # ==================== 静态资源（命运卡 / 角色 / 场景图）====================
    location /static/ {
        alias /var/www/hfe/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ==================== 健康检查 ====================
    location /health {
        proxy_pass http://127.0.0.1:8765/api/version;
        access_log off;
    }
}