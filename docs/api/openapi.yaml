openapi: 3.0.0
info:
  title: 历史脚注引擎 API
  description: |
    明代万历年间沉浸式剧情游戏 HTTP API
    v1.7.29 - 自动从 router_registry 生成
  version: 1.7.29
  contact:
    name: wenbo0527
    url: https://github.com/wenbo0527/history-footnote-engine

servers:
  - url: http://localhost:8765
    description: 本地开发服务器

tags:
  - name: game
    description: 游戏核心 API（开局/输入/状态）
  - name: stream
    description: SSE 流式 API
  - name: archive
    description: 存档/读档/列表
  - name: meta
    description: 元数据/版本/反馈
  - name: tools
    description: 工具/校验/监控

paths:
  /api/archive/delete:
    post:
      summary: "删除一个存档"
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/archives:
    get:
      summary: "列出存档"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/archives/clear:
    post:
      summary: "清空某 era 的所有存档（需 confirm）"
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/character_wiki:
    get:
      summary: "获取本存档的角色 Wiki"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/character_wiki_update:
    post:
      summary: "手动编辑某条 wiki entry"
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
