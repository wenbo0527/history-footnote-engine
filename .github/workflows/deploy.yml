# 🆕 v2.10.9 部署 workflow
#
# 触发：
#   1. push tag v*.*.* → 自动构建 Docker 镜像 + push 到 GHCR
#   2. workflow_dispatch → 手动触发，可选部署到 staging / production
#
# 流程：
#   1. 跑全量测试（与 release.yml 一致）
#   2. 构建多平台 Docker 镜像（linux/amd64, linux/arm64）
#   3. push 到 ghcr.io/wenbo0527/history-footnote-engine
#   4. （可选）通过 SSH 部署到目标服务器
#
# 所需 Secrets（在 GitHub repo Settings → Secrets 配置）：
#   - DEPLOY_SSH_KEY: 目标服务器的 SSH 私钥
#   - DEPLOY_HOST: 目标服务器地址
#   - DEPLOY_USER: SSH 用户名

name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        type: choice
        default: 'staging'
        options:
          - staging
          - production
      skip_deploy:
        description: '只构建镜像不部署'
        type: boolean
        default: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.ref_name }}

jobs:
  test:
    name: Run all tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio fastapi uvicorn
          pip install langchain langchain-core langchain-anthropic langchain-openai langgraph
          pip install -e .

      - name: Backend pytest
        run: |
          PYTHONPATH=src python -m pytest tests/ -q --tb=line 2>&1 | tail -10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Frontend vitest
        run: |
          cd src/frontend
          npm install --no-audit --no-fund
          npx vitest run

  build:
    name: Build & push Docker image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: Deploy to ${{ inputs.environment || 'staging' }}
    needs: build
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_deploy != true)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ inputs.environment || 'staging' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/history-footnote-engine
            echo "=== Pulling image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ==="
            docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            echo "=== Stopping old container ==="
            docker stop hfe || true
            docker rm hfe || true

            echo "=== Starting new container ==="
            docker run -d \
              --name hfe \
              --restart unless-stopped \
              -p 8765:8765 \
              -v $(pwd)/saves:/app/saves \
              -v $(pwd)/runtime:/app/runtime \
              -v $(pwd)/eras:/app/eras \
              -v $(pwd)/logs:/app/logs \
              --env-file .env \
              ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            echo "=== Health check ==="
            sleep 5
            curl -sf http://localhost:8765/api/version || (echo "FAIL" && exit 1)
            echo "=== Deploy OK ==="

            # 清理旧镜像（保留最近 3 个）
            docker images ${{ env.IMAGE_NAME }} --format "{{.Tag}}" \
              | grep -v "${{ env.IMAGE_TAG }}\|latest" \
              | tail -n +4 \
              | xargs -r -I {} docker rmi ${{ env.IMAGE_NAME }}:{} || true